<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="112" fill="#1e0d4e"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- K vertical stem -->
  <rect x="82" y="72" width="46" height="200" rx="20" fill="url(#g)"/>
  <!-- K lower arm -->
  <line x1="122" y1="185" x2="248" y2="270" stroke="url(#g)" stroke-width="44" stroke-linecap="round"/>
  <!-- K upper arm = mic capsule at 45deg -->
  <g transform="rotate(45 168 110)">
    <rect x="148" y="46" width="48" height="118" rx="24" fill="url(#g)"/>
    <line x1="158" y1="78"  x2="188" y2="78"  stroke="white" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
    <line x1="158" y1="100" x2="188" y2="100" stroke="white" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
    <line x1="158" y1="122" x2="188" y2="122" stroke="white" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
