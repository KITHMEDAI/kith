<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #1e0d4e; display: flex; align-items: center; justify-content: center; width: 512px; height: 512px; }
</style>
</head>
<body>
<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="320" rx="72" fill="#1e0d4e"/>

  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- K vertical stem -->
  <rect x="80" y="72" width="46" height="176" rx="22" fill="url(#g)"/>

  <!-- K lower arm -->
  <line x1="120" y1="168" x2="252" y2="264" stroke="url(#g)" stroke-width="44" stroke-linecap="round"/>

  <!-- K upper arm = mic capsule -->
  <g transform="rotate(45 172 112)">
    <rect x="148" y="44" width="48" height="120" rx="24" fill="url(#g)"/>
    <!-- Mic grill lines -->
    <line x1="158" y1="76"  x2="188" y2="76"  stroke="white" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
    <line x1="158" y1="98"  x2="188" y2="98"  stroke="white" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
    <line x1="158" y1="120" x2="188" y2="120" stroke="white" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
</body>
</html>
